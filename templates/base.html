<!DOCTYPE html>
<html lang="ko" data-theme="silk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>enemy-controller</title>
  <link rel="stylesheet" href="/static/themes.css">
  <link rel="stylesheet" href="/static/daisyui.css">
  <link rel="stylesheet" href="/static/gridstack.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/htmx.min.js"></script>
  <script src="/static/gridstack-all.js"></script>
  <style>
    /* GridStack item shell */
    .grid-stack-item-content {
      inset: 0;
      position: absolute;
      display: flex;
      flex-direction: column;
    }
    .grid-stack-item-content > .card {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-scroll { flex: 1; overflow-y: auto; min-height: 0; }

    /* Drag handle strip */
    .gs-drag-handle {
      display: flex;
      align-items: center;
      padding: 5px 10px 5px 12px;
      border-bottom: 1px solid oklch(var(--bc) / 0.08);
      cursor: grab;
      user-select: none;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .gs-drag-handle:hover { background: oklch(var(--bc) / 0.04); }
    .gs-drag-handle:active { cursor: grabbing; }

    /* Hide button — appears on handle hover */
    .gs-drag-handle .hide-btn {
      margin-left: auto;
      opacity: 0;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 1px 3px;
      border-radius: 3px;
      color: oklch(var(--bc) / 0.4);
      transition: opacity 0.15s, color 0.15s, background 0.15s;
    }
    .gs-drag-handle:hover .hide-btn { opacity: 1; }
    .gs-drag-handle .hide-btn:hover {
      color: oklch(var(--er) / 0.8);
      background: oklch(var(--er) / 0.08);
    }

    /* ── Font scaling ── */
    /* panel title (drag handle): ×1.8 */
    .gs-drag-handle > span { font-size: 1.35rem; }

    /* panel content: ×1.5 */
    .card-scroll .text-xs  { font-size: 1.125rem; }
    .card-scroll .text-sm  { font-size: 1.3125rem; }

    /* sidebar + topbar: ×1.3 */
    .drawer-side .text-xs  { font-size: 0.975rem; }
    .drawer-side .text-sm  { font-size: 1.1375rem; }
    .navbar .text-xs       { font-size: 0.975rem; }
    .navbar .text-base     { font-size: 1.3rem; }

    /* Panel picker */
    .picker-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 5px 10px;
      border-radius: 5px;
      transition: background 0.12s;
    }
    .picker-item:hover { background: rgb(0 0 0 / 0.08); }
    #panel-picker-list {
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      min-width: 11rem;
      z-index: 50;
    }

    /* Mobile: no grab cursor */
    @media (max-width: 767px) {
      .gs-drag-handle { cursor: default; }
      .gs-drag-handle .hide-btn { display: none; }
    }

    /* Resize handle — dot pattern, hover-only */
    .grid-stack > .grid-stack-item > .ui-resizable-handle.ui-resizable-se {
      width: 14px;
      height: 14px;
      right: 4px;
      bottom: 4px;
      background:
        radial-gradient(circle, oklch(var(--bc) / 0.35) 1.2px, transparent 1.2px) 0 0 / 5px 5px,
        radial-gradient(circle, oklch(var(--bc) / 0.35) 1.2px, transparent 1.2px) 5px 5px / 5px 5px;
      background-repeat: repeat;
      opacity: 0;
      transition: opacity 0.15s;
      cursor: se-resize;
    }
    .grid-stack > .grid-stack-item:hover > .ui-resizable-handle.ui-resizable-se { opacity: 1; }

    /* Hover ring on card */
    .grid-stack-item-content > .card {
      transition: box-shadow 0.15s;
    }
    .grid-stack > .grid-stack-item:hover > .grid-stack-item-content > .card {
      box-shadow: 0 0 0 1.5px oklch(var(--bc) / 0.12);
    }
  </style>
</head>
<body class="min-h-screen bg-base-100">

<div class="drawer lg:drawer-open">
  <input id="sidebar-toggle" type="checkbox" class="drawer-toggle">

  <div class="drawer-content flex flex-col min-h-screen">
    <!-- topbar -->
    <header class="navbar bg-base-200 border-b border-base-300 sticky top-0 z-10 px-4">
      <div class="flex-none lg:hidden">
        <label for="sidebar-toggle" class="btn btn-ghost btn-square" aria-label="open sidebar">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </label>
      </div>
      <div class="flex-1">
        <span class="font-mono font-semibold text-base">enemy-controller</span>
      </div>
      <div class="flex-none">
        {% if role == "admin" %}
          <span class="badge badge-warning font-mono text-xs">admin</span>
        {% else %}
          <span class="badge badge-ghost font-mono text-xs">public</span>
        {% endif %}
      </div>
    </header>

    <!-- swappable main content -->
    <main id="main-content" class="p-6 flex-1">
      {% block main %}{% endblock %}
    </main>
  </div>

  <!-- sidebar -->
  <div class="drawer-side z-20">
    <label for="sidebar-toggle" class="drawer-overlay"></label>
    <nav class="w-52 min-h-full bg-base-200 border-r border-base-300 flex flex-col p-4 gap-1">
      <p class="text-xs text-base-content/40 uppercase tracking-widest px-3 py-2">Services</p>
      <ul class="menu menu-sm gap-0.5 w-full">
        {% for s in services %}
        <li>
          <a class="font-mono text-sm"
             hx-get="/services/{{ s.key }}"
             hx-target="#main-content"
             hx-swap="innerHTML"
             hx-push-url="/services/{{ s.key }}">
            {{ s.title }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</div>

</body>
</html>
