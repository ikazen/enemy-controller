<div class="card-body p-4 gap-2">
  <div class="flex gap-2 mb-1">
    <span class="badge badge-success badge-sm font-mono">{{ data.running }} run</span>
    <span class="badge badge-ghost badge-sm font-mono">{{ data.pending }} wait</span>
  </div>
  <div class="flex flex-col gap-1">
    {% for item in data.items %}
    <div class="flex items-center justify-between">
      <span class="text-xs font-mono text-base-content/60">{{ item.competition_id }}</span>
      <span class="text-[10px] font-mono
        {% if item.status == 'running' %}text-success
        {% else %}text-base-content/40{% endif %}">{{ item.status }}</span>
    </div>
    {% endfor %}
    {% if not data.items %}
    <p class="text-xs text-base-content/30 font-mono">queue empty</p>
    {% endif %}
  </div>
</div>
